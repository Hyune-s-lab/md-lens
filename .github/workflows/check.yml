name: Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Check and build plugin
        run: ./gradlew check buildPlugin verifyPluginProjectConfiguration verifyPluginStructure

      - name: Upload plugin distribution
        uses: actions/upload-artifact@v7
        with:
          name: md-lens-plugin
          path: build/distributions/*.zip
          retention-days: 7
